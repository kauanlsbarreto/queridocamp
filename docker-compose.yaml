services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_TOKEN: ${GIT_TOKEN:-}
    env_file:
      - /var/www/envs/queridocamp.env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      NODE_OPTIONS: --max-old-space-size=1024
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    restart: unless-stopped
    ports:
      - 80:3001
    volumes:
      - /var/www/queridocamp/public:/app/public
      - fotostime_uploads:/app/public/fotostime
    networks:
      - sitequerido-network
networks:
  sitequerido-network:

volumes:
  fotostime_uploads:
    driver: local
