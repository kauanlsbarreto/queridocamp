services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_TOKEN: ${GIT_TOKEN:-}
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://botuser:aF!0_%40MM360J@187.77.45.123:3306/bancoks}
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_TELEMETRY_DISABLED: "1"
      GIT_AUTHOR_NAME: "Docker Auto-Update"
      GIT_AUTHOR_EMAIL: "docker@sitequerido.com"
      GIT_COMMITTER_NAME: "Docker Auto-Update"
      GIT_COMMITTER_EMAIL: "docker@sitequerido.com"
      GIT_TOKEN: ${GIT_TOKEN:-}
      COPADRAFT_DESAFIAR_QUERY_TIMEOUT_MS: ${COPADRAFT_DESAFIAR_QUERY_TIMEOUT_MS:-5000}
      COPADRAFT_DESAFIAR_CONNECT_TIMEOUT_MS: ${COPADRAFT_DESAFIAR_CONNECT_TIMEOUT_MS:-4000}
      COPADRAFT_DESAFIAR_LOAD_TIMEOUT_MS: ${COPADRAFT_DESAFIAR_LOAD_TIMEOUT_MS:-3500}
      COPADRAFT_DESAFIAR_CACHE_TTL_MS: ${COPADRAFT_DESAFIAR_CACHE_TTL_MS:-60000}
      COPADRAFT_JOGOS_QUERY_TIMEOUT_MS: ${COPADRAFT_JOGOS_QUERY_TIMEOUT_MS:-5000}
      COPADRAFT_JOGOS_CACHE_TTL_MS: ${COPADRAFT_JOGOS_CACHE_TTL_MS:-60000}
      COPADRAFT_JOGOS_LOAD_TIMEOUT_MS: ${COPADRAFT_JOGOS_LOAD_TIMEOUT_MS:-3500}
      COPADRAFT_MYSQL_QUERY_TIMEOUT_MS: ${COPADRAFT_MYSQL_QUERY_TIMEOUT_MS:-20000}
      DB_QUERY_LOG_TIMEOUT_MS: ${DB_QUERY_LOG_TIMEOUT_MS:-1200}
      DB_QUERY_LOG_ENABLED: ${DB_QUERY_LOG_ENABLED:-0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-sitequerido}
      TOKEN_PAGSEGURO: ${TOKEN_PAGSEGURO:-}
      PAGBANK_WEBHOOK_TOKEN: ${PAGBANK_WEBHOOK_TOKEN:-}
      PAGBANK_WEBHOOK_HMAC_SECRET: ${PAGBANK_WEBHOOK_HMAC_SECRET:-}
      PAGBANK_API_BASE_URL: ${PAGBANK_API_BASE_URL:-https://api.pagseguro.com/}
      PAGBANK_DEFAULT_TAX_ID: ${PAGBANK_DEFAULT_TAX_ID:-}
      LOJA_PAGAMENTO_DISCORD_WEBHOOK_URL: ${LOJA_PAGAMENTO_DISCORD_WEBHOOK_URL:-}
      LOJA_WEBHOOK_URL: ${LOJA_WEBHOOK_URL:-}
      LOJA_PURCHASE_WEBHOOK_URL: ${LOJA_PURCHASE_WEBHOOK_URL:-}
      FACEIT_API_KEY: ${FACEIT_API_KEY:-}
      API_BREVO: ${API_BREVO:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      CS2_IP: ${CS2_IP:-217.196.63.100}
      CS2_PORT: ${CS2_PORT:-27015}
      CS2_PASSWORD: ${CS2_PASSWORD:-5d0091b9086d44dab92b64e7b15b29b7}
      DATHOST_EMAIL: ${DATHOST_EMAIL:-}
      DATHOST_PASSWORD: ${DATHOST_PASSWORD:-}
    
    depends_on:
      redis:
        condition: service_healthy
    
    networks:
      - sitequerido-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=app,env=production"
    
    volumes:
      - /var/www/queridocamp/public:/app/public
      - fotostime_uploads:/app/public/fotostime

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - sitequerido-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=redis,env=production"
    
    volumes:
      - redis-data-prod:/data
    
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sitequerido}

volumes:
  redis-data-prod:
    driver: local
  fotostime_uploads:
    driver: local

networks:
  sitequerido-network:
    driver: bridge