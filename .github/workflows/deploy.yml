name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/front-end

            echo "[$(date)] Resetando repositório local..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "[$(date)] Reconstruindo e subindo container..."
            docker-compose up -d --build

            echo "[$(date)] Limpando imagens dangling (versões anteriores)..."
            docker image prune -f

            echo "[$(date)] Limpando cache de build antigo (>48h)..."
            docker builder prune --filter "until=48h" -f

            echo "[$(date)] Front-end atualizado e limpo com sucesso!"