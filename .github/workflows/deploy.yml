name: Deploy Frontend
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            # 1. Entra na pasta e puxa apenas as mudanças do código
            cd /home/ubuntu/front-end && git pull origin main && cd ..
            
            # 2. SOBE O SITE USANDO CACHE
            # Removi o 'builder prune' e o '--force-recreate'
            # O Docker agora só vai reinstalar o que mudou no package.json ou requirements.txt
            docker compose up -d --build
            
            # 3. Limpa APENAS o que sobrou (imagens sem nome), sem mexer no cache de build
            docker image prune -f
            
            sleep 5
            docker ps --format "table {{.Names}}\t{{.Status}}"