name: Deploy Frontend
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            git pull origin main
            docker compose build --no-cache front-end
            docker compose up -d postgres_db
            sleep 10
            docker compose up -d faceit_api_app
            docker compose up -d front_end_app
            docker compose up -d ubuntu-nginx-1
            ./atualizar_frontend.sh