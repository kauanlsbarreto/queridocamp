name: Deploy Frontend
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo pkill -f docker || true
            sudo service docker restart
            sleep 10
            
            cd /home/ubuntu/front-end
            git pull origin main
            
            cd /home/ubuntu
            
            docker compose up -d postgres_db faceit_api_app ubuntu-nginx-1
            
            docker compose up -d front_end_app
            
            docker ps