name: Deploy Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files to Hostinger
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          DEPLOY_PATH: /var/www/queridocamp
        run: |
          set -euo pipefail

          for v in SSH_HOST SSH_USER SSH_KEY DEPLOY_PATH; do
            if [ -z "${!v:-}" ]; then
              echo "Secret ausente: $v"
              exit 1
            fi
          done

          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=20"

          # Valida acesso SSH e prepara pasta de deploy antes do rsync.
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH' && echo 'SSH_OK'"

          rsync -az --delete --checksum \
            --omit-dir-times --no-perms --no-owner --no-group \
            --itemize-changes \
            -e "ssh $SSH_OPTS" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.open-next' \
            --exclude='.deploy-env' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Deploy via SSH (Hostinger)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            DEPLOY_PATH="/var/www/queridocamp"
            export COMPOSE_PROJECT_NAME="queridocamp"

            cd "$DEPLOY_PATH"

            docker compose version
            docker compose config >/dev/null
            DOCKER_BUILDKIT=1 docker compose up -d --build --remove-orphans

            CURRENT_APP_IMAGE_ID="$(docker compose images -q app | head -n 1 || true)"
            if [ -n "$CURRENT_APP_IMAGE_ID" ]; then
              OLD_APP_IMAGE_IDS="$(docker image ls --format '{{.Repository}} {{.ID}}' | awk '$1 == "queridocamp-app" {print $2}' | sort -u | grep -vx "$CURRENT_APP_IMAGE_ID" || true)"
              if [ -n "$OLD_APP_IMAGE_IDS" ]; then
                echo "Removendo imagens antigas do app"
                docker rmi -f $OLD_APP_IMAGE_IDS || true
              fi
            fi

            docker image prune -f || true
            docker builder prune -af || true