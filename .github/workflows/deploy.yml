name: Deploy Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files to Hostinger (rsync - somente alterados)
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete --checksum \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.open-next' \
            --exclude='.deploy-env' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Deploy via SSH (Hostinger)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          command_timeout: 60m
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            IMAGE_NAME="sitequerido-app"
            TEMP_CONTAINER="sitequerido-app-next"
            ACTIVE_CONTAINER="sitequerido-app"
            TEMP_PORT="3002"
            FINAL_PORT="80"

            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH nao configurado nos secrets"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            BUILD_TAG="${{ github.sha }}"
            DOCKER_BUILDKIT=1 docker build --progress=plain -t "$IMAGE_NAME:$BUILD_TAG" -t "$IMAGE_NAME:latest" .

            ENV_FILE=".deploy-env"
            if docker ps -a --format '{{.Names}}' | grep -qx "$ACTIVE_CONTAINER"; then
              docker inspect "$ACTIVE_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' > "$ENV_FILE"
            elif [ -f .env ]; then
              cp .env "$ENV_FILE"
            else
              echo "Nao foi possivel encontrar um container ativo nem arquivo .env"
              exit 1
            fi

            docker rm -f "$TEMP_CONTAINER" >/dev/null 2>&1 || true
            docker run -d \
              --name "$TEMP_CONTAINER" \
              --env-file "$ENV_FILE" \
              -p "$TEMP_PORT":3001 \
              "$IMAGE_NAME:$BUILD_TAG"

            echo "Aguardando o novo container ficar saudavel..."
            HEALTH_URL="http://127.0.0.1:$TEMP_PORT/api/health"
            READY=0
            for i in $(seq 1 90); do
              if curl -fsS "$HEALTH_URL" >/dev/null 2>&1; then
                READY=1
                break
              fi
              sleep 2
            done

            if [ "$READY" -ne 1 ]; then
              echo "Novo container nao ficou saudavel a tempo. Mantendo o antigo em execucao."
              docker logs "$TEMP_CONTAINER" --tail 200 || true
              docker rm -f "$TEMP_CONTAINER" >/dev/null 2>&1 || true
              exit 1
            fi

            echo "Novo container pronto. Trocando o antigo pelo novo..."
            if docker ps -a --format '{{.Names}}' | grep -qx "$ACTIVE_CONTAINER"; then
              docker stop "$ACTIVE_CONTAINER" >/dev/null 2>&1 || true
              docker rm "$ACTIVE_CONTAINER" >/dev/null 2>&1 || true
            fi

            # Libera a porta caso outro processo ainda esteja ocupando
            fuser -k "${FINAL_PORT}/tcp" 2>/dev/null || true
            sleep 3

            docker run -d \
              --name "$ACTIVE_CONTAINER" \
              --env-file "$ENV_FILE" \
              -p "$FINAL_PORT":3001 \
              --restart always \
              "$IMAGE_NAME:$BUILD_TAG"

            docker rm -f "$TEMP_CONTAINER" >/dev/null 2>&1 || true
            docker image prune -af --filter "until=24h" || true