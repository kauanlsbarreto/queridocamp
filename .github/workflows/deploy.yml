name: Deploy Frontend
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Atualiza o código
            cd /home/ubuntu/front-end && git pull origin main && cd ..
            
            # 2. LIMPEZA TOTAL (Para o site atualizar de verdade e não travar)
            docker compose down
            docker builder prune -a -f
            docker system prune -f
            
            # 3. Build e Start
            docker compose up -d --build --force-recreate
            
            # 4. Limpeza de imagens mortas
            docker image prune -f
            
            sleep 5
            docker ps --format "table {{.Names}}\t{{.Status}}"