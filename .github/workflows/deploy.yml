name: Deploy Frontend
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}     # Cadastre o IP nos secrets também
          username: "ubuntu"                 # Usuário padrão do Lightsail Ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            # Comandos para atualizar
            cd /home/ubuntu
            ./atualizar_frontend.sh

                      