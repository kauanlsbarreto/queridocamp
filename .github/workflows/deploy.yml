name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
              # Configuração de Swap (Essencial para builds Next.js em VPS pequenas)
              if [ ! -f /swapfile ]; then
                sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
                sudo swapon /swapfile
                echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
              fi

              cd /home/ubuntu/front-end

              echo "--- Atualizando código ---"
              git fetch origin main
              git reset --hard origin/main

              echo "--- Limpeza de Cache de Build do Docker ---"
              # Remove builds inacabados e caches antigos para liberar espaço
              docker builder prune -f --filter "until=24h"

              echo "--- Iniciando Build (Zero Downtime Preparation) ---"
              # Constrói a nova imagem sem derrubar a atual ainda
              docker-compose build --pull

              echo "--- Reiniciando Containers ---"
              # O up -d substitui os containers assim que a imagem está pronta
              docker-compose up -d --remove-orphans

              echo "--- Limpeza Final de Imagens Órfãs ---"
              docker image prune -f
              docker system prune -f --volumes

              echo "Deploy finalizado com sucesso!"