name: Deploy Frontend
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}     # Cadastre o IP nos secrets também
          username: "ubuntu"                 # Usuário padrão do Lightsail Ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            docker compose up -d postgres_db faceit_api_app ubuntu-nginx-1
            docker compose up -d front_end_app &
            disown
            echo "Comando enviado. O servidor processará o build em background."