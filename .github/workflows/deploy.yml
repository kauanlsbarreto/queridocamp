name: Deploy Frontend
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m

          script: |
            # 1. Entrar na pasta e limpar Git
            cd /home/ubuntu/front-end
            echo "--- Limpando Git e Forçando Pull ---"
            git clean -fd
            git fetch --all
            git reset --hard origin/main
            
            # 2. Limpeza pesada de cache (Remove o que está a pesar no disco)
            echo "--- Limpeza de Cache Docker ---"
            docker builder prune -a -f
            docker image prune -f
            
            # 3. Build e Deploy
            echo "--- Iniciando Build Novo ---"
            # Ajuste aqui: se o docker-compose.yml estiver dentro de /front-end, remova o 'cd ..'
            # Se o docker-compose.yml estiver na /home/ubuntu, mantenha o 'cd ..'
            cd .. 
            docker compose build --no-cache
            docker compose up -d
            
            echo "--- Status Final ---"
            docker ps