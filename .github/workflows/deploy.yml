name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            # 1. TENTATIVA DE CRIAR SWAP (Se não existir)
            # Isso usa o disco como RAM para evitar que o Docker trave no "Download complete"
            if [ ! -f /swapfile ]; then
              echo "Criando Swap para evitar travamento..."
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi

            cd /home/ubuntu/front-end

            echo "[$(date)] 1. Resetando Git..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "[$(date)] 2. Liberando RAM (Parando site antigo)..."
            # IMPORTANTE: Parar o site antes do build libera RAM para o Docker descompactar a imagem
            docker-compose down || true
            docker system prune -f

            echo "[$(date)] 3. Iniciando Build e Up..."
            # Aqui o Docker vai baixar e extrair. Com o Swap criado acima, não deve travar.
            docker-compose up -d --build

            echo "[$(date)] 4. Limpeza final..."
            docker image prune -f

            echo "[$(date)] Deploy finalizado com sucesso!"