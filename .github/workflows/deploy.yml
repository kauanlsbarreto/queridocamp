name: Deploy Frontend
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}     # Cadastre o IP nos secrets também
          username: "ubuntu"                 # Usuário padrão do Lightsail Ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            # 1. Mata qualquer build travado para liberar RAM
            sudo pkill -f docker || true
            sudo service docker restart
            sleep 5
            
            # 2. Sobe apenas os containers que JÁ ESTÃO PRONTOS
            # Isso vai tirar o erro de 'Conexão Recusada' imediatamente
            docker compose up -d db nginx faceit_api
            
            # 3. Tenta subir o front sem buildar de novo (usando o que foi feito até o timeout)
            docker compose up -d front-end || echo "Front ainda não compilado"
            
            # 4. Me mostre se eles estão 'Up'
            docker ps