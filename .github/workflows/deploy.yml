name: Deploy Frontend
on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/front-end && git pull origin main && cd ..
            
            echo "--- Limpeza de Imagens Antigas ---"
            # Remove apenas imagens órfãs, mantendo o cache de build
            docker image prune -f
            
            echo "--- Build com Logs em Tempo Real (Evita Timeout) ---"
            cd ..
            # Força a exibição de logs para manter a conexão ativa
            docker compose build --progress=plain
            docker compose up -d
            
            echo "--- Verificando Status Final ---"
            sleep 5
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"