name: Deploy Frontend
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}     # Cadastre o IP nos secrets também
          username: "ubuntu"                 # Usuário padrão do Lightsail Ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Comandos para atualizar
            echo "--- Listando pastas em /home/ubuntu ---"
            ls -F /home/ubuntu
            
            echo "--- Localizando o arquivo docker-compose.yml ---"
            find /home/ubuntu -name "docker-compose.yml"