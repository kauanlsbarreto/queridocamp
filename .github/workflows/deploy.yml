name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
              set -e

              echo "[$(date)] Iniciando deploy..."

              # ---------- SWAP ----------
              if [ ! -f /swapfile ]; then
                echo "[$(date)] Configurando swap..."
                sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
                sudo swapon /swapfile
                echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
              fi

              # ---------- CÓDIGO ----------
              cd /home/ubuntu/front-end

              echo "[$(date)] Atualizando código..."
              git fetch origin main
              git reset --hard origin/main

              # ---------- DOCKER ----------
              echo "[$(date)] Parando containers antigos..."
              docker-compose down --remove-orphans

              echo "[$(date)] Subindo containers com build..."
              docker-compose up -d --build

              # ---------- LIMPEZA INTELIGENTE ----------
              if [ ! -f /tmp/docker-prune.lock ] || find /tmp/docker-prune.lock -mmin +1440; then
                echo "[$(date)] Limpando cache Docker com mais de 3 dias..."
                touch /tmp/docker-prune.lock

                docker container prune -f --filter "until=72h"
                docker image prune -a -f --filter "until=72h"
                docker builder prune -f --filter "until=72h"

                echo "[$(date)] Limpeza concluída"
              else
                echo "[$(date)] Limpeza ignorada (executada recentemente)"
              fi

              echo "[$(date)] Deploy finalizado com sucesso!"
