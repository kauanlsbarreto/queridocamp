name: Deploy Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files to Hostinger
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -az --delete --checksum \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.open-next' \
            --exclude='.deploy-env' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Deploy via SSH (Hostinger)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            IMAGE_NAME="sitequerido-app"
            ACTIVE_CONTAINER="sitequerido-app"
            ACTIVE_PORT="3001"

            cd "$DEPLOY_PATH"

            BUILD_TAG="${{ github.sha }}"
            DOCKER_BUILDKIT=1 docker build --progress=plain -t "$IMAGE_NAME:$BUILD_TAG" -t "$IMAGE_NAME:latest" .

            ENV_FILE=".deploy-env"
            if docker ps -a --format '{{.Names}}' | grep -qx "$ACTIVE_CONTAINER"; then
              docker inspect "$ACTIVE_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' > "$ENV_FILE"
            elif [ -f .env ]; then
              cp .env "$ENV_FILE"
            else
              echo "Nao foi possivel encontrar um container ativo nem arquivo .env"
              exit 1
            fi

            # Remove container antigo antes de rodar o novo
            docker rm -f "$ACTIVE_CONTAINER" || true

            # Libera a porta caso outro container ainda esteja publicado nela
            PORT_CONTAINERS=$(docker ps --filter "publish=$ACTIVE_PORT" --format '{{.ID}}')
            if [ -n "$PORT_CONTAINERS" ]; then
              echo "Removendo containers que ocupam a porta $ACTIVE_PORT"
              docker rm -f $PORT_CONTAINERS || true
            fi

            # Fallback: encerra processo local que possa estar prendendo a porta
            if command -v fuser >/dev/null 2>&1; then
              fuser -k "${ACTIVE_PORT}/tcp" 2>/dev/null || true
            fi

            # Rodar container ativo novo
            docker run -d \
              --name "$ACTIVE_CONTAINER" \
              --env-file "$ENV_FILE" \
              -p "$ACTIVE_PORT":3001 \
              --restart always \
              "$IMAGE_NAME:$BUILD_TAG"

            docker image prune -af --filter "until=24h" || true