name: Deploy Frontend
on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/front-end
            
            echo "--- SUBSTITUIÇÃO TOTAL DOS ARQUIVOS ---"
            git fetch --all
            # Apaga arquivos locais que não estão no git
            git clean -fd 
            # Força o código a ser IGUAL ao que você enviou
            git reset --hard origin/main
            
            echo "--- LIMPANDO IMAGENS ANTIGAS ---"
            docker image prune -f
            
            echo "--- RECONSTRUINDO DOCKER (SEM LIXO) ---"
            cd ..
            # --build força o Docker a olhar para os novos arquivos
            docker compose up -d --build
            
            echo "--- STATUS ATUAL ---"
            docker ps --format "table {{.Names}}\t{{.Status}}"