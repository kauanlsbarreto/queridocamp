name: Deploy Frontend
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/front-end
            
            echo "--- Pull Rápido ---"
            git fetch origin main
            git reset --hard origin/main
            
            echo "--- Limpeza Leve (Apenas imagens soltas) ---"
            # Remove apenas o que não está sendo usado, sem tocar no cache de build útil
            docker image prune -f
            
            echo "--- Deploy Inteligente (Usando Cache) ---"
            cd ..
            # Sem o --no-cache, ele só builda o que você alterou no commit
            docker compose up -d --build
            
            echo "--- Pronto ---"
            docker ps --format "table {{.Names}}\t{{.Status}}"