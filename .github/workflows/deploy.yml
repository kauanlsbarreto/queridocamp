name: Deploy Frontend
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}     # Cadastre o IP nos secrets também
          username: "ubuntu"                 # Usuário padrão do Lightsail Ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            sudo docker compose down --remove-orphans || true
            sudo service docker restart
            sleep 10
            
            sudo docker compose up -d db faceit_api
            sleep 5
          
            sudo docker compose up -d nginx
            
            sudo docker compose up -d front-end
            
            sudo docker ps