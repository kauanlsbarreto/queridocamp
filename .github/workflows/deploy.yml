name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m  # Tempo estendido para builds lentos
          script: |
            # set -e interrompe o script se qualquer comando falhar
            set -e

            cd /home/ubuntu/front-end

            echo "[$(date)] 1/5: Limpando TUDO para liberar RAM..."
            # Para todos os containers e remove volumes/imagens não usados 
            # para dar o máximo de fôlego ao sistema antes do build.
            docker system prune -a --volumes -f

            echo "[$(date)] 2/5: Sincronizando repositório..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "[$(date)] 3/5: Baixando imagem base isoladamente..."
            # Fazemos o pull antes do build para não sobrecarregar a rede e RAM simultaneamente
            docker pull node:18-slim

            echo "[$(date)] 4/5: Reconstruindo container (Isso pode demorar)..."
            # O build Next.js é pesado. Se travar aqui, o problema é falta de RAM física.
            docker-compose up -d --build

            echo "[$(date)] 5/5: Limpeza final de build..."
            docker builder prune --filter "until=1h" -f

            echo "[$(date)] Deploy finalizado com sucesso!"