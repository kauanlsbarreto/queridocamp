name: Deploy Frontend

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m

          script: |
            echo "Iniciando atualização do Front-end..."

            cd /home/ubuntu/front-end

            echo "Baixando alterações do Git..."
            git pull origin main

            echo "Parando containers antigos..."
            docker compose down

            echo "Reconstruindo e subindo container..."
            docker compose build
            docker compose up -d

            echo "Limpando imagens dangling..."
            docker image prune -f

            echo "Limpando cache de build antigo..."
            docker builder prune -f --filter "until=48h"

            echo "Front-end atualizado e limpo com sucesso!"
