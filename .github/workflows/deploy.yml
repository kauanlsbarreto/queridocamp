name: Deploy Frontend
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            
            echo "--- Limpando Git e Forçando Pull ---"
            git clean -fd
            git fetch --all
            git reset --hard origin/main
            
            echo "--- Limpeza Pesada de Cache do Docker ---"
            docker builder prune -a -f
            
            echo "--- Iniciando Build Novo ---"
            cd ..
            docker compose build --no-cache
            docker compose up -d
            echo "--- Status dos Containers ---"
            docker ps